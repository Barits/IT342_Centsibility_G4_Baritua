# Spring Boot Application Configuration
spring.application.name=centsibility

# Server Configuration
server.port=${SERVER_PORT:8080}

# Database Configuration (PostgreSQL/Supabase)
# Using environment variables for security - see .env.example
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/centsibility}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${DB_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# JWT Configuration
# IMPORTANT: Change JWT_SECRET in production to a secure random value
jwt.secret=${JWT_SECRET:centsibilitySecretKeyForJWTAuthenticationThatIsLongEnough123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Google OAuth Configuration
google.client.id=${GOOGLE_CLIENT_ID:659620521160-9vglmm4br68te4ro8s6i5oti8jfipb66.apps.googleusercontent.com}

# Logging
logging.level.com.centsibility=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:DEBUG}

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:5}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
